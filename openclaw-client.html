<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw WebSocket Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            height: 90vh;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background-color: #4ade80;
            animation: pulse-green 2s infinite;
        }

        .status-dot.disconnected {
            background-color: #ef4444;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes pulse-green {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .content {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 20px;
            padding: 20px;
        }

        .config-panel {
            flex: 0 0 250px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-right: 20px;
            border-right: 1px solid #e5e7eb;
            overflow-y: auto;
        }

        .config-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .config-group label {
            font-weight: 600;
            font-size: 13px;
            color: #374151;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .config-group input,
        .config-group select {
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            transition: border-color 0.2s;
        }

        .config-group input:focus,
        .config-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .config-group input[type="password"] {
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }

        .btn-connect {
            padding: 10px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-connect:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        .btn-connect:active {
            transform: translateY(0);
        }

        .btn-connect:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow: hidden;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 8px;
        }

        .messages::-webkit-scrollbar {
            width: 8px;
        }

        .messages::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .messages::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 85%;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 16px 16px 4px 16px;
        }

        .message.assistant {
            align-self: flex-start;
            background: #f3f4f6;
            color: #1f2937;
            border-radius: 16px 16px 16px 4px;
        }

        .message.system {
            align-self: center;
            background: #fef3c7;
            color: #92400e;
            border-radius: 8px;
            font-size: 13px;
            max-width: 90%;
            text-align: center;
        }

        .message.error {
            align-self: flex-start;
            background: #fee2e2;
            color: #991b1b;
            border-radius: 16px 16px 16px 4px;
            border-left: 3px solid #dc2626;
        }

        .input-area {
            display: flex;
            gap: 12px;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-area input:disabled {
            background-color: #f3f4f6;
            cursor: not-allowed;
        }

        .btn-send {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            align-self: flex-end;
        }

        .btn-send:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        .btn-send:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #9ca3af;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(1) {
            animation-delay: 0s;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        .timestamp {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌐 OpenClaw WebSocket Client</h1>
            <div class="status-indicator">
                <div class="status-dot disconnected" id="statusDot"></div>
                <span id="statusText">Disconnected</span>
            </div>
        </div>

        <div class="content">
            <div class="config-panel">
                <div class="config-group">
                    <label>Host</label>
                    <input type="text" id="host" value="localhost" placeholder="localhost">
                </div>

                <div class="config-group">
                    <label>Port</label>
                    <input type="number" id="port" value="18790" placeholder="18790">
                </div>

                <div class="config-group">
                    <label>Token</label>
                    <input type="password" id="token" placeholder="Paste your token">
                </div>

                <div class="config-group">
                    <label>Model</label>
                    <select id="model">
                        <option value="xiaomi-token-plan/mimo-v2.5-pro">Xiaomi MiMo V2.5 Pro</option>
                        <option value="xiaomi/mimo-v2-pro">Xiaomi MiMo V2 Pro</option>
                        <option value="xiaomi/mimo-v2-flash">Xiaomi MiMo V2 Flash</option>
                    </select>
                </div>

                <button class="btn-connect" id="connectBtn">Connect</button>
            </div>

            <div class="chat-panel">
                <div class="messages" id="messages"></div>

                <div class="input-wrapper">
                    <input
                        type="text"
                        id="messageInput"
                        placeholder="Type your message..."
                        disabled
                    >
                    <button class="btn-send" id="sendBtn" disabled>Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const state = {
            ws: null,
            connected: false,
            conversationHistory: []
        };

        const elements = {
            host: document.getElementById('host'),
            port: document.getElementById('port'),
            token: document.getElementById('token'),
            model: document.getElementById('model'),
            connectBtn: document.getElementById('connectBtn'),
            messageInput: document.getElementById('messageInput'),
            sendBtn: document.getElementById('sendBtn'),
            messages: document.getElementById('messages'),
            statusDot: document.getElementById('statusDot'),
            statusText: document.getElementById('statusText')
        };

        function updateStatus(connected) {
            state.connected = connected;
            elements.statusDot.className = `status-dot ${connected ? 'connected' : 'disconnected'}`;
            elements.statusText.textContent = connected ? 'Connected' : 'Disconnected';
            elements.connectBtn.textContent = connected ? 'Disconnect' : 'Connect';
            elements.messageInput.disabled = !connected;
            elements.sendBtn.disabled = !connected;
        }

        function addMessage(content, role = 'assistant', isError = false) {
            const messageEl = document.createElement('div');
            messageEl.className = `message ${isError ? 'error' : role}`;

            const time = new Date().toLocaleTimeString();
            messageEl.innerHTML = `
                ${content}
                <div class="timestamp">${time}</div>
            `;

            elements.messages.appendChild(messageEl);
            elements.messages.scrollTop = elements.messages.scrollHeight;
        }

        function connect() {
            if (state.connected) {
                disconnect();
                return;
            }

            const host = elements.host.value || 'localhost';
            const port = elements.port.value || '18790';
            const token = elements.token.value;

            if (!token) {
                addMessage('Error: Token is required', 'system', true);
                return;
            }

            const wsUrl = `ws://${host}:${port}`;
            addMessage(`Connecting to ${wsUrl}...`, 'system');

            try {
                state.ws = new WebSocket(wsUrl);

                state.ws.onopen = () => {
                    updateStatus(true);
                    addMessage('✓ Connected to OpenClaw', 'system');

                    // Send initial authentication
                    const authMessage = {
                        type: 'auth',
                        token: token
                    };
                    state.ws.send(JSON.stringify(authMessage));
                };

                state.ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);

                        if (data.type === 'auth_response') {
                            if (data.success) {
                                addMessage('✓ Authenticated successfully', 'system');
                            } else {
                                addMessage(`✗ Authentication failed: ${data.message}`, 'system', true);
                            }
                        } else if (data.type === 'message') {
                            addMessage(data.content, 'assistant');
                        } else if (data.type === 'error') {
                            addMessage(`Error: ${data.message}`, 'system', true);
                        } else {
                            // Display raw response
                            addMessage(JSON.stringify(data, null, 2), 'assistant');
                        }
                    } catch (e) {
                        addMessage(event.data, 'assistant');
                    }
                };

                state.ws.onerror = (error) => {
                    updateStatus(false);
                    addMessage(`✗ WebSocket error: ${error.message || 'Unknown error'}`, 'system', true);
                };

                state.ws.onclose = () => {
                    updateStatus(false);
                    addMessage('✗ Disconnected from OpenClaw', 'system');
                };
            } catch (error) {
                updateStatus(false);
                addMessage(`✗ Failed to connect: ${error.message}`, 'system', true);
            }
        }

        function disconnect() {
            if (state.ws) {
                state.ws.close();
                state.ws = null;
            }
            updateStatus(false);
        }

        function sendMessage() {
            const content = elements.messageInput.value.trim();
            if (!content || !state.connected) return;

            // Add user message to history
            addMessage(content, 'user');
            state.conversationHistory.push({ role: 'user', content });

            // Send message
            const message = {
                type: 'message',
                model: elements.model.value,
                messages: state.conversationHistory,
                temperature: 0.7,
                max_tokens: 2048
            };

            try {
                state.ws.send(JSON.stringify(message));
                elements.messageInput.value = '';
            } catch (error) {
                addMessage(`✗ Failed to send message: ${error.message}`, 'system', true);
            }
        }

        // Event listeners
        elements.connectBtn.addEventListener('click', connect);
        elements.sendBtn.addEventListener('click', sendMessage);

        elements.messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Initialize
        updateStatus(false);
        addMessage('Welcome to OpenClaw WebSocket Client. Enter your credentials and connect to get started.', 'system');
    </script>
</body>
</html>
