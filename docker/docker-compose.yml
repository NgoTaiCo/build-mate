version: '3.8'

services:
  openclaw-gateway:
    image: openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    user: "0:0"
    ports:
      - "${OPENCLAW_PORT}:18790"
    volumes:
      - openclaw-config:/root/.openclaw
      - openclaw-workspace:/workspace
      - ./openclaw.json:/root/.openclaw/openclaw.json:ro
      - ${PWD}/packages:/root/.openclaw/packages
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - OPENCLAW_CONFIG_PATH=/root/.openclaw/openclaw.json
      - OPENCLAW_STATE_DIR=/root/.openclaw
      - XIAOMI_TOKEN_PLAN_API_KEY=${XIAOMI_TOKEN_PLAN_API_KEY}
    env_file:
      - .env
    shm_size: 1gb
    cap_add:
      - SYS_ADMIN

volumes:
  openclaw-config:
    name: ${PROJECT_NAME:-buildmate}_openclaw_config
  openclaw-workspace:
    name: ${PROJECT_NAME:-buildmate}_openclaw_workspace
